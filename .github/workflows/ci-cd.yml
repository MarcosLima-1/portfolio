name: ci-cd
run-name: CI/CD - ${{ github.run_number }}

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route and image types
        run: bun run script:generate-types

      - name: Run lint
        run: bun run lint

  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  integration-tests:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tests and healthChecker
        run: docker compose -f ./docker/test/docker-compose.yml up --wait --wait-timeout 480 --build --remove-orphans

      - name: View logs on failure
        if: failure()
        run: docker compose -f ./docker/test/docker-compose.yml logs

      - name: Shutdown all services
        if: always()
        run: docker compose -f ./docker/test/docker-compose.yml down -v

  image-scan:
    needs: integration-tests
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Define image tag
        id: meta
        run: |
          branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          sanitized_branch_name="${branch_name//\//-}"
          echo "tag=${{ secrets.DOCKER_USERNAME }}/apps:${{ github.event.repository.name }}-${sanitized_branch_name}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/prod/dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tag }}
          format: "table"
          exit-code: 0
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy_report.txt"

  registry-push:
    needs: image-scan
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'dev') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/prod/dockerfile
          push: true
          load: true
          tags: ${{ needs.image-scan.outputs.image-tag }}

  notify:
    needs:
      - lint
      - unit-test
      - integration-tests
      - image-scan
      - registry-push
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Classify pipeline result
        id: result
        run: |
          if [ "${{ needs.lint.result }}" = "success" ] && \
             [ "${{ needs.unit-test.result }}" = "success" ] && \
             [ "${{ needs.integration-tests.result }}" = "success" ] && \
             [ "${{ needs.image-scan.result }}" = "success" ] && \
             { [ "${{ needs.registry-push.result }}" = "success" ] || [ "${{ needs.registry-push.result }}" = "skipped" ]; }; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Send 'Success' notification
        if: ${{ steps.result.outputs.status == 'success' }}
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#00FF00"
          message: |
            ✅ **Pipeline Concluída com Sucesso!**
            - Repositório: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Workflow: ${{ github.workflow }}
            - Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send 'Failure' notification
        if: ${{ steps.result.outputs.status == 'failure' }}
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#FF0000"
          message: |
            ⚠️ **Pipeline Falhou!**
            - Repositório: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Workflow: ${{ github.workflow }}
            - Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
